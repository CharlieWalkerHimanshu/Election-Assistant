# Election Navigator – Google Cloud Build configuration
# Builds the backend Docker image, pushes to Artifact Registry, deploys to Cloud Run.
#
# Required substitution variables (set in Cloud Build trigger):
#   _AR_HOSTNAME     – Artifact Registry hostname  (default: us-docker.pkg.dev)
#   _DEPLOY_REGION   – Cloud Run region             (default: us-central1)
#   _SERVICE_NAME    – Cloud Run service name       (default: election-navigator-api)
#
# Required Cloud Build service account roles:
#   roles/run.admin, roles/iam.serviceAccountUser, roles/artifactregistry.writer
#
# Secret Manager secret expected:
#   OPENAI_API_KEY  → mounted as Cloud Run secret env var (set via Terraform / gcloud CLI)

steps:
  # ── 1. Build Docker image ───────────────────────────────────────────────────
  - id: Build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - >-
        $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - --tag
      - >-
        $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:latest
      - --file
      - backend/Dockerfile
      - backend

  # ── 2. Push to Artifact Registry ────────────────────────────────────────────
  - id: Push
    name: gcr.io/cloud-builders/docker
    waitFor: [Build]
    args:
      - push
      - --all-tags
      - >-
        $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME

  # ── 3. Deploy to Cloud Run ──────────────────────────────────────────────────
  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [Push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image
      - >-
        $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - --region=$_DEPLOY_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --min-instances=0
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --set-env-vars=NODE_ENV=production
      # OPENAI_API_KEY is injected via Secret Manager at runtime:
      # --set-secrets=OPENAI_API_KEY=openai-api-key:latest
      # Uncomment the line above once the secret is created in Secret Manager.

# Image pushed to Artifact Registry
images:
  - >-
    $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA

substitutions:
  _AR_HOSTNAME: us-docker.pkg.dev
  _DEPLOY_REGION: us-central1
  _SERVICE_NAME: election-navigator-api

options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: 'true'
